jobspy:
  enabled: true
  sites:
    - indeed
    - linkedin
    - glassdoor
    - zip_recruiter
    - google
  site_settings:
    - name: indeed
      enabled: true
      priority: 1
    - name: linkedin
      enabled: true
      priority: 2
    - name: glassdoor
      enabled: true
      priority: 3
    - name: zip_recruiter
      enabled: true
      priority: 4
    - name: google
      enabled: true
      priority: 5
  search_terms:
    - software engineer intern canada
    - data engineer intern canada
    - perception engineer intern canada
    - robotics software engineer intern canada
    - nlp engineer intern canada
  auto_search_terms:
    enabled: true
    include_profile_tracks: true
    include_profile_keywords: true
    max_terms: 28
  locations:
    - Toronto, ON
    - Waterloo, ON
    - Vancouver, BC
    - Montreal, QC
    - Ottawa, ON
    - Markham, ON
    - Remote, Canada
  days_back: 7
  results_wanted: 100
  country_indeed: canada
  parallel_site_workers: 3
  stop_after_consecutive_empty: 3
  stop_after_consecutive_error: 2
  min_attempts_before_pause: 10

manual_links:
  enabled: true
  path: data/raw/alerts/links_today.txt

external_sources:
  enabled: true
  github_watch:
    enabled: true
    repos:
      - reposnegarprh/Canadian-Tech-Internships-2026
      - SimplifyJobs/Summer2026-Internships
  internee:
    enabled: true
    url: https://internee.ca
  company_careers:
    enabled: true
    config_path: config/company_careers.yaml
    include_tiers:
      - tier_a
      - tier_b
      - tier_c
      - tier_d
    max_links_per_company: 25

uwo_connect:
  enabled: false
  dashboard_url: https://connect.uwo.ca/myAccount/dashboard.htm
  jobs_url: ""
  headless: false
  require_manual_confirm: true
  manual_wait_seconds: 0
  user_data_dir: data/raw/uwo_connect_session
  max_pages: 3
